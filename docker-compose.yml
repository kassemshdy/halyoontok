services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: halyoontok
      POSTGRES_PASSWORD: halyoontok
      POSTGRES_DB: halyoontok
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  admin-api:
    build:
      context: ./backend
      dockerfile: admin-api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      PORT: "8080"
    depends_on:
      - postgres
      - redis

  front-api:
    build:
      context: ./backend
      dockerfile: front-api/Dockerfile
    ports:
      - "8081:8081"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MEDIA_BASE_URL: http://media-api:8083
      PORT: "8081"
    depends_on:
      - postgres
      - redis

  upload-api:
    build:
      context: ./backend
      dockerfile: upload-api/Dockerfile
    ports:
      - "8082:8082"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      STORAGE_BACKEND: local
      LOCAL_STORAGE_DIR: /storage
      PORT: "8082"
    volumes:
      - media_storage:/storage
    depends_on:
      - postgres
      - redis

  media-api:
    build:
      context: ./backend
      dockerfile: media-api/Dockerfile
    ports:
      - "8083:8083"
    environment:
      MEDIA_STORAGE_DIR: /storage
      PORT: "8083"
    volumes:
      - media_storage:/storage

  celery-worker:
    build:
      context: ./backend
      dockerfile: admin-api/Dockerfile
    command: celery -A halyoontok.background.celery_app worker --loglevel=info
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  celery-beat:
    build:
      context: ./backend
      dockerfile: admin-api/Dockerfile
    command: celery -A halyoontok.background.celery_app beat --loglevel=info
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  media_storage:
