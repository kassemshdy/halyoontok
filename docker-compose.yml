services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: halyoontok
      POSTGRES_PASSWORD: halyoontok
      POSTGRES_DB: halyoontok
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  celery-primary:
    build: ./backend
    command: celery -A halyoontok.background.celery.apps.primary worker -l info -Q primary
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  celery-media:
    build: ./backend
    command: celery -A halyoontok.background.celery.apps.media worker -l info -Q media
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
