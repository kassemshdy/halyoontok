kind = "web"
previewPath = "/"
title = "Halyoon"
version = "1.0.0"
id = "artifacts/halyoon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26096

[services.development]
run = "pnpm --filter @workspace/halyoon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/halyoon", "run", "build" ]
publicDir = "artifacts/halyoon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26096"
BASE_PATH = "/"
